name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.2.0). Used only for the artifact name on manual runs."
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Same gates as CI — never ship a build that wouldn't pass CI.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble importable plugin
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGE="kroyer-${VERSION}"
          mkdir -p "${STAGE}/dist"
          cp manifest.json "${STAGE}/manifest.json"
          cp dist/plugin.js dist/index.html "${STAGE}/dist/"
          zip -r "kroyer-${VERSION}.zip" "${STAGE}"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${GITHUB_REF_NAME}" \
            "kroyer-${VERSION}.zip" \
            --title "Krøyer ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: kroyer-${{ steps.version.outputs.version }}
          path: kroyer-${{ steps.version.outputs.version }}.zip
